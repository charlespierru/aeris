<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aeris — Wind & Brass</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/soundfont-player/dist/soundfont-player.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div>
    <div class="logo-text">Aeris</div>
    <div class="logo-sub">Scales & Arpeggios — Wind & Brass</div>
  </div>
  <div class="badge">Advanced</div>
</header>

<main>

  <div class="controls">
    <div class="control-group">
      <label>Root Note</label>
      <select id="rootSelect">
        <option value="C">C</option>
        <option value="C#">C#</option>
        <option value="Db">D♭</option>
        <option value="D">D</option>
        <option value="D#">D#</option>
        <option value="Eb">E♭</option>
        <option value="E">E</option>
        <option value="F">F</option>
        <option value="F#">F#</option>
        <option value="Gb">G♭</option>
        <option value="G">G</option>
        <option value="G#">G#</option>
        <option value="Ab">A♭</option>
        <option value="A">A</option>
        <option value="A#">A#</option>
        <option value="Bb">B♭</option>
        <option value="B">B</option>
      </select>
    </div>
    <div class="control-group">
      <label>Scale Type</label>
      <select id="scaleTypeSelect">
        <option value="major">Major</option>
        <option value="natural_minor">Natural Minor</option>
        <option value="harmonic_minor">Harmonic Minor</option>
        <option value="melodic_minor">Melodic Minor</option>
        <option value="dorian">Dorian</option>
        <option value="mixolydian">Mixolydian</option>
        <option value="lydian">Lydian</option>
        <option value="phrygian">Phrygian</option>
        <option value="whole_tone">Whole Tone</option>
        <option value="diminished">Diminished (Half-Whole)</option>
        <option value="chromatic">Chromatic</option>
      </select>
    </div>
    <div class="control-group">
      <label>Instrument Transposition</label>
      <select id="transposeSelect">
        <option value="0">Concert Pitch (C)</option>
        <option value="-2">B♭ Instruments (Trumpet, Clarinet, Tenor Sax)</option>
        <option value="-9">E♭ Instruments (Alto Sax, E♭ Clarinet)</option>
        <option value="-7">F Instruments (French Horn)</option>
      </select>
      <div id="audioStatus" class="audio-status">Loading…</div>
    </div>
  </div>

  <!-- Main panel -->
  <div class="display-panel">
    <div class="scale-header">
      <div>
        <div class="scale-name" id="scaleName">
          <span id="scaleNameText">C Major</span><span class="octave-label">8a</span><select id="octaveSelect" title="Octave de la note fondamentale"></select>
        </div>
        <div class="enharmonic-note" id="enharmonicNote"></div>
      </div>
      <div class="scale-type-badge badge-major" id="scaleBadge">Major</div>
    </div>

    <!-- Notes row with intervals -->
    <div style="margin-bottom:1.25rem;">
      <div class="section-label">Scale Degrees</div>
      <div class="notes-row" id="notesRow"></div>
    </div>

    <!-- Interval formula -->
    <div style="margin-bottom:0.75rem;">
      <div class="section-label">Interval Formula</div>
      <div id="intervalFormula" class="formula-text"></div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <div class="info-card-label">Key Signature</div>
        <div class="info-card-value" id="keySignature">—</div>
      </div>
      <div class="info-card">
        <div class="info-card-label">Relative Key</div>
        <div class="info-card-value" id="relativeKey">—</div>
      </div>
      <div class="info-card">
        <div class="info-card-label">Common Use</div>
        <div class="info-card-value" id="commonUse">—</div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="arpeggio">Arpeggios</button>
    <button class="tab-btn" data-tab="practice">Practice Tips</button>
    <button class="tab-btn" data-tab="technique">Technique Notes</button>
    <button class="tab-btn" data-tab="patterns">Patterns</button>
  </div>

  <!-- Tab: Arpeggio -->
  <div class="tab-panel active" id="tab-arpeggio">
    <div style="margin-bottom:1rem;">
      <div class="section-label">Triad Arpeggio</div>
      <div class="arpeggio-display" id="triadArp"></div>
    </div>
    <div style="margin-bottom:1rem;">
      <div class="section-label">7th Chord Arpeggio</div>
      <div class="arpeggio-display" id="seventhArp"></div>
    </div>
    <div style="margin-bottom:1rem;">
      <div class="section-label">9th Chord Arpeggio</div>
      <div class="arpeggio-display" id="ninthArp"></div>
    </div>
    <div style="margin-bottom:1rem;">
      <div class="section-label">11th Chord Arpeggio</div>
      <div class="arpeggio-display" id="eleventhArp"></div>
    </div>
    <div style="margin-bottom:1rem;">
      <div class="section-label">13th Chord Arpeggio</div>
      <div class="arpeggio-display" id="thirteenthArp"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--violet)"></div> Root</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green); opacity:0.8"></div> 3rd</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--cyan); opacity:0.8"></div> 5th</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber); opacity:0.8"></div> 7th</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange); opacity:0.8"></div> 9th</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--purple); opacity:0.8"></div> 11th</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--teal); opacity:0.8"></div> 13th</div>
    </div>
  </div>

  <!-- Tab: Practice -->
  <div class="tab-panel" id="tab-practice">
    <ul class="tips-list" id="practiceTips"></ul>
  </div>

  <!-- Tab: Technique -->
  <div class="tab-panel" id="tab-technique">
    <div class="fingering-note" id="techniqueNotes"></div>
  </div>

  <!-- Tab: Patterns -->
  <div class="tab-panel" id="tab-patterns">
    <div id="patternsContent"></div>
  </div>

</main>

<!-- Listen modal -->
<div id="listenModal" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" id="modalClose" title="Fermer">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
    </button>
    <div class="modal-header">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3.5 3.5 0 0 1-7 0"/><path d="M15 8.5a2.5 2.5 0 0 0-5 0v1a2 2 0 1 0 4 0"/></svg>
      <span>Écoute interactive</span>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- Interactive content à venir -->
    </div>
  </div>
</div>

<script src="script.js?v=4"></script>
</body>
</html>
